name: Deploy API

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: deploy-api-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync API to server
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          REMOTE_PORT: ${{ secrets.DEPLOY_PORT }}
          SOURCE: ./
          TARGET: ${{ secrets.API_DEPLOY_PATH }}
          ARGS: "-rlgoDzvc --delete --exclude .git --exclude node_modules"

      - name: Install prod deps and restart API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            cd ${{ secrets.API_DEPLOY_PATH }}
            npm ci --omit=dev
            pm2 restart epicstudia-api || pm2 start app.js --name epicstudia-api
